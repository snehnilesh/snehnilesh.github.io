<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, user-scalable=no">
    <title>Home</title>
    <link rel="preload" href="work.html" as="document">
    <link rel="preload" href="about.html" as="document">
</head>
<body>
    <div class="cursor"></div>

    <div class="menu">
        <a href="/work" class="menu-item slide-up">Work</a>
        <a href="/about" class="menu-item slide-up">About</a>
    </div>

    <div class="page-title slide-up">Sneh Nilesh</div>

</body>
<style>
    @import url('https://fonts.cdnfonts.com/css/sf-pro-display');
    :root {
        --select-menu-item: cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    body {
        margin: 0;
        padding: 0;
        font-family: 'SF Pro Display', sans-serif;
        /* background-color: #040e13; */
        background-color: rgb(16, 16, 16);
        /* background-color: black; */
    }
    html {
        scroll-behavior: smooth;
        -ms-overflow-style: none;  /* IE and Edge */
        scrollbar-width: none;  /* Firefox */
        overflow: hidden;
        cursor: none;
        -webkit-user-select: none; /* Safari */        
        -moz-user-select: none; /* Firefox */
        -ms-user-select: none; /* IE10+/Edge */
        user-select: none; /* Standard */
    }
    .page-title {
        width: 100vw;
        text-align: center;
        flex-wrap: nowrap;
        font-size: clamp(3.5rem, 4vw, 4.5rem);
        color: white;
        font-weight: 550;
        display: flex;
        justify-content: center;
        align-items: center;
        pointer-events: none;
        /* center on page */
        position: absolute;
        top: calc(50% - 4rem);
    }
    .menu {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        pointer-events: none;
        z-index: 9995;
        scale: 0.8;
        margin-top: -0.8rem;
    }
    .menu-items {
        display: flex;
        justify-content: center;
        align-items: center;
        margin-top: 10rem;
    }
    .menu-item {
        padding-left: 1.25rem;
        padding-right: 1.25rem;
        overflow: hidden;
        line-height: 117%;
        padding-top: 0.75rem;
    }
    .menu-item, .menu-item-on {
        color: white;
        font-size: clamp(1.2rem, 1.3vw, 1.4rem);
        text-decoration: none;
        pointer-events: none; transform: translate3d(0%, 0%, 0px);
        will-change: transform;
        transform: translate3d(0, 110%, 0);
        pointer-events: all;
        transition: opacity 300ms var(--select-menu-item);
    }
    .menu-item-on, .menu-item:hover {
        opacity: 0.8;
        font-weight: 425;
    }
    .menu div {
        margin-right: 22px;
        margin-left: 22px;
        white-space: nowrap;
    }
    .menu-item {
        opacity: 0.3;
        font-weight: 300;
        cursor: none;
    }
    :root {
        --card-color: rgb(16, 16, 16);
    }
    .cursor {
        position: fixed;
        left: 0;
        pointer-events: none;
        border-radius: 50%;
        transition: transform 0s;
        background: white;
        top: 0;
        width: 20px;
        height: 20px;
        z-index: 9999;
        opacity: 0;
        transition: opacity 0.5s,
                    border-radius 0.2s,
                    width 0.2s,
                    height 0.2s
    }
    .slide-up {
        animation: slideUp ease-in-out 0.8s;
    }
    @keyframes slideUp {
        0% {transform: translateY(24px);opacity: 0;}
    }
    .slide-down {
        animation: slideDown ease-in-out 0.8s;
    }
    @keyframes slideDown {
        0% {transform: translateY(8px);opacity: 0;}
        100% {transform: translateY(0);opacity: 1;}
    }
    .slide-left {
        animation: slideLeft ease-in-out 1.2s;
    }
    @keyframes slideLeft {
        0% {transform: translateX(40vw);opacity: 0;}
        100% {transform: translateX(-12vw);opacity: 1;}
    }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/2.0.2/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.6.1/gsap.min.js"></script>
<script src="/assets/js/cursorMain.js"></script>
<script src="/assets/js/preventKeys.js"></script>
<script>
    window.onload = function() {
        window.scrollTo(0, 0);
    }
</script>
</html>
